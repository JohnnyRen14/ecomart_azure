name: Deploy EcoMart Azure Prototype

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az group create \
              --name rg-ecomart-prototype \
              --location northeurope \
              --tags Environment=prototype CostCentre=IT-CLOUD Project=ecomart-migration Owner=lrenyee@novatech.com

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-ecomart-prototype
          template: ./main.bicep
          failOnStdErr: false
